<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>QA - Iframe sandboxed</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 32px;
      }

      iframe {
        width: 520px;
        height: 220px;
        border: 2px solid #c53030;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Padre con iframe sandboxed</h1>
      <iframe
        title="Preview sandboxed"
        sandbox
        srcdoc="<main style='font-family: system-ui; padding: 24px; background: #fff5f5; min-height: 160px;'><h1>Contenido sandboxed</h1><p>No debe capturarse a ciegas.</p></main>"
      ></iframe>
    </main>
  </body>
</html>
